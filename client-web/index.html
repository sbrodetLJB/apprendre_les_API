<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Carnet d'adresses — client web</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Carnet d'adresses</h1>

  <p>
    Ce client web parle indifféremment à l'une ou l'autre des deux API de ce
    projet — c'est la preuve qu'une API est un contrat, pas une technologie.
  </p>

  <label for="api-base-url">API utilisée :</label>
  <select id="api-base-url">
    <option value="http://localhost:8000">FastAPI (port 8000)</option>
    <option value="http://localhost:8001">PHP natif (port 8001)</option>
  </select>

  <h2 id="form-title">Ajouter un contact</h2>
  <form id="contact-form">
    <input type="hidden" id="contact-id" />
    <input type="text" id="firstName" placeholder="Prénom" required />
    <input type="text" id="lastName" placeholder="Nom" required />
    <input type="email" id="email" placeholder="Email" required />
    <input type="tel" id="phone" placeholder="Téléphone (optionnel)" />
    <button type="submit" id="submit-button">Ajouter</button>
    <button type="button" id="cancel-button" hidden>Annuler la modification</button>
  </form>

  <p id="error-message" class="error" hidden></p>

  <h2>Contacts</h2>
  <ul id="contacts-list"></ul>

  <script src="app.js"></script>
</body>
</html>
